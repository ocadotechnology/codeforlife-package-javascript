  release:
    # needs: [build] # TODO: add contributor
    concurrency: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # to enable use of OIDC for npm provenance
    # Release if:
    #  - the repo's owner is Ocado Tech.
    #  - a change is made to the default branch.
    if: |
      github.repository_owner_id == 2088731 &&
      github.ref_name == github.event.repository.default_branch
    steps:
      - name: 🤖 Set up CFL bot
        uses: ocadotechnology/codeforlife-workspace/.github/actions/bot/setup@main
        id: setup-bot
        with:
          cfl-app-private-key: ${{ secrets.CFL_APP_PRIVATE_KEY }}

      - name: 🚀 Publish Semantic Release
        uses: ocadotechnology/codeforlife-workspace/.github/actions/github/release@main
        with:
          # ref: ${{ needs.build.outputs.sha }}#
          cfl-bot-gh-token: ${{ steps.setup-bot.outputs.token }}
          cfl-bot-user-name: ${{ steps.setup-bot.outputs.user-name }}
          cfl-bot-user-email: ${{ steps.setup-bot.outputs.user-email }}

  monitor:
    uses: ocadotechnology/codeforlife-workspace/.github/workflows/monitor-javascript-release.yaml@main
    secrets: inherit
    needs: [release]
    with:
      node-version: 22

  submodule:
    uses: ocadotechnology/codeforlife-workspace/.github/workflows/gitmodules.yaml@main
    secrets: inherit
    needs: [release]
